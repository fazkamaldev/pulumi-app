services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-settings:
    build: ./backend-settings
    environment:
      DATABASE_URL: mysql+pymysql://app:app@db:3306/appdb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  backend-brand:
    build: ./backend-brand
    environment:
      DATABASE_URL: mysql+pymysql://app:app@db:3306/appdb
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  backend-car:
    build: ./backend-car
    environment:
      DATABASE_URL: mysql+pymysql://app:app@db:3306/appdb
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
      backend-brand:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        INIT_SETTINGS_API_URL: http://localhost:8000
        INIT_BRAND_API_URL: http://localhost:8001
        INIT_CAR_API_URL: http://localhost:8002
    ports:
      - "5173:80"
    depends_on:
      - backend-settings
      - backend-brand
      - backend-car
